name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Suite de tests (labos de tous les chapitres)
        # python -m ajoute la racine du dépôt au sys.path (import jobmatch)
        run: python -m pytest tests/ -v
